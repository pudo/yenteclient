name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e python/.[dev]

      - name: ruff check
        working-directory: python
        run: ruff check .

      - name: ruff format --check
        working-directory: python
        run: ruff format --check .

      - name: mypy --strict
        working-directory: python
        run: mypy

      - name: pytest (offline, with coverage)
        working-directory: python
        run: pytest -m "not live" --cov=yente_client --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: python/coverage.xml
          retention-days: 30

      - name: pip-audit (dependency CVE scan)
        if: matrix.python-version == '3.12'
        working-directory: python
        # Soft-fail: surfaces advisories without blocking the build today.
        # Dependabot handles the upgrade PRs separately. Once we trust the
        # signal, drop `|| true` to enforce.
        run: |
          pip install pip-audit
          pip-audit --strict || true

      - name: regen_model.py --check (drift detector)
        run: python scripts/regen_model.py --check --skip-fetch

      - name: docs build (mkdocs --strict)
        working-directory: python
        run: mkdocs build --strict

      - name: CHANGELOG touched (advisory, PRs only)
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        # The checkout is shallow (depth 1). Fetch the PR base SHA so we
        # have both commits locally; `git diff base head` then works
        # without needing a merge-base. `|| true` keeps the step
        # advisory if the fetch ever fails.
        run: |
          git fetch origin "$BASE_SHA" --depth=1 || true
          python scripts/check_changelog.py || true

  live-api:
    # Runs only after the offline matrix is green, and only when secrets are
    # available — i.e. on push to main or on PRs from the same repo. PRs from
    # forks skip this job by design (Actions hides secrets from them).
    needs: python
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e python/.[dev]

      - name: pytest -m live
        working-directory: python
        env:
          OPENSANCTIONS_API_KEY: ${{ secrets.OPENSANCTIONS_API_KEY }}
          YENTE_BASE_URL: ${{ secrets.YENTE_BASE_URL }}
        run: pytest -m live -v
